# Maine PUMS 2020 - Batch Size 8192 Experiment (Baseline Architecture)
# Goal: Push to maximum batch size to fully saturate 24GB RTX 3090
# Architecture: dim_t=1024, factor=32 (proven baseline)

[data]
dequant_dist = "none"
int_dequant_factor = 0

[unimodmlp_params]
num_layers = 2
d_token = 4
n_head = 1
factor = 32          # Baseline architecture (large model)
bias = true
dim_t = 1024         # Baseline architecture (large time embedding)
use_mlp = true

[diffusion_params]
num_timesteps = 25
scheduler = 'power_mean_per_column'        # CRITICAL: Per-column for mixed scales
cat_scheduler = 'log_linear_per_column'    # CRITICAL: Per-column for categoricals
noise_dist = 'uniform_t'

[diffusion_params.sampler_params]
stochastic_sampler = true
second_order_correction = true

[diffusion_params.edm_params]
precond = true
sigma_data = 1.0
net_conditioning = "sigma"

[diffusion_params.noise_dist_params]
P_mean = -1.2
P_std = 1.2

[diffusion_params.noise_schedule_params]
sigma_min = 0.002
sigma_max = 80
rho = 7
eps_max = 1e-3
eps_min = 1e-5
rho_init = 7.0
rho_offset = 5.0
k_init = -6.0
k_offset = 1.0

[train.main]
steps = 8000
lr = 0.001
weight_decay = 0
ema_decay = 0.997
batch_size = 8192        # 16x larger batch size - maximum saturation test
check_val_every = 1000
lr_scheduler = "reduce_lr_on_plateau"
factor = 0.90
reduce_lr_patience = 50
closs_weight_schedule = "anneal"
c_lambda = 1.0
d_lambda = 1.0
use_amp = false          # Disable AMP for baseline comparison

[sample]
batch_size = 10000
